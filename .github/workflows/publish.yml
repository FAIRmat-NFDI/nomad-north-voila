name: Upload Python Package

on:
  # workflow_dispatch:
  workflow_run:
    workflows: ["publish north"]
    types:
      - completed

env:
  PYTHON_VERSION: 3.12
  WAIT_TIME: 1800 # 30 minutes in seconds
  CHECK_INTERVAL: 120 # 2 minutes in seconds
  IMAGE: "ghcr.io/fairmat-nfdi/nomad-north-voila"

jobs:
